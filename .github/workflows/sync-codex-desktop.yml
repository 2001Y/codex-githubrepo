name: Sync Codex Desktop asset to GitHub Releases

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore sync state
        uses: actions/cache@v4
        with:
          path: downloads/codex-desktop-sync-state.json
          key: codex-desktop-sync-state-v1
          restore-keys: |
            codex-desktop-sync-state-v1

      - name: Download latest Codex Desktop asset
        id: sync
        env:
          SOURCE_FILE_URLS: |
            {
              "macos-arm64": {
                "url": "https://persistent.oaistatic.com/codex-app-prod/Codex.dmg",
                "output_name": "Codex.dmg"
              },
              "macos-x64": {
                "url": "https://persistent.oaistatic.com/codex-app-prod/Codex-latest-x64.dmg",
                "output_name": "Codex-latest-x64.dmg"
              },
              "windows": {
                "url": "https://get.microsoft.com/installer/download/9PLM9XGG6VKS?cid=website_cta_psi",
                "output_name": "Codex Installer.exe"
              }
            }
          DOWNLOAD_ROOT: downloads
          STATE_PATH: downloads/codex-desktop-sync-state.json
        run: |
          set -euo pipefail

          RESULT_FILE="${RUNNER_TEMP}/codex-desktop-sync-result.json"
          CHANGED_ASSETS_FILE="${RUNNER_TEMP}/codex-desktop-changed-assets.txt"

          python3 scripts/sync-codex-desktop.py | tee "$RESULT_FILE"

          SYNC_STATUS=$(python3 - "$RESULT_FILE" <<'PY'
import json
import pathlib
import sys

data = json.loads(pathlib.Path(sys.argv[1]).read_text())
print(data.get("status", ""))
PY
)
          echo "status=$SYNC_STATUS" >> "$GITHUB_OUTPUT"

          python3 - "$RESULT_FILE" "$CHANGED_ASSETS_FILE" <<'PY'
import json
import pathlib
import sys

result_file, out_file = sys.argv[1], sys.argv[2]
data = json.loads(pathlib.Path(result_file).read_text())
with pathlib.Path(out_file).open("w", encoding="utf-8") as fp:
    for item in data.get("results", []):
        if item.get("status") == "synced":
            fp.write(f"{item['path']}\n")
PY

          ASSET_COUNT=$(wc -l < "$CHANGED_ASSETS_FILE" | tr -d " ")
          echo "asset_count=$ASSET_COUNT" >> "$GITHUB_OUTPUT"

      - name: Upload changed assets to GitHub Releases
        if: steps.sync.outputs.asset_count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RELEASE_TAG="codex-desktop-latest"
          RELEASE_NAME="Codex Desktop (latest)"
          CHANGED_ASSETS_FILE="${RUNNER_TEMP}/codex-desktop-changed-assets.txt"

          if ! gh release view "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$RELEASE_NAME" \
              --notes "Auto-generated by GitHub Actions."
          fi

          while IFS= read -r asset; do
            if [ -n "${asset}" ]; then
              gh release upload "$RELEASE_TAG" "$asset" \
                --repo "${GITHUB_REPOSITORY}" \
                --clobber
            fi
          done < "$CHANGED_ASSETS_FILE"

      - name: Save sync state
        uses: actions/cache@v4
        with:
          path: downloads/codex-desktop-sync-state.json
          key: codex-desktop-sync-state-v1
